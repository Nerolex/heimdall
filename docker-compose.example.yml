# Heimdall — Docker Compose snippet
# Add this service to your existing docker-compose.yml on home.local

services:
  heimdall:
    image: ghcr.io/nerolex/heimdall:latest
    container_name: heimdall
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./heimdall/config.json:/app/config.json:ro
      - ./heimdall/photos:/app/photos:ro
    environment:
      - PORT=3000
      - HOST=0.0.0.0

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # check every 5 minutes
      - WATCHTOWER_CLEANUP=true        # remove old images after update
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: heimdall                  # only watch the heimdall container
